<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Sites</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="wrap">
  <div class="header">
    <h1>Web sites</h1>
    <span id="slotCount">0 / 64</span>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">Add web site</h2>
    <div class="field">
      <label for="nameInput">Web site's name</label>
      <input type="text" id="nameInput" placeholder="Web Site`s Name" autocomplete="off">
    </div>
    <div class="field">
      <label for="urlInput">Web site's URL link</label>
      <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
    </div>
    <div class="error-text" id="errorText">Enter both a name and a valid URL.</div>
    <div class="modal-actions">
      <button class="btn" id="cancelBtn">Cancel</button>
      <button class="btn primary" id="saveBtn">Save</button>
    </div>
  </div>
</div>
<script src="script.js"></script>
</body>
</html>
